esphome:
  name: closet-lights
  friendly_name: Closet Lights

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Closet Lights Fallback"
    password: !secret fallback_password

captive_portal:

# LED strip output (PWM via LEDC)
output:
  - platform: ledc
    pin: GPIO4
    id: led_output

# Expose as a dimmable light in Home Assistant
light:
  - platform: monochromatic
    name: "Closet Light"
    output: led_output
    id: closet_light
    restore_mode: ALWAYS_OFF

# PIR motion sensor
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO14
      mode:
        input: true
        pulldown: true
    name: "Closet PIR"
    id: closet_pir
    device_class: motion
    on_press:
      - light.turn_on: closet_light
      - script.stop: auto_off
    on_release:
      - script.execute: auto_off

# Auto-off timer — restarts if motion stops then resumes
script:
  - id: auto_off
    then:
      - delay: 60s
      - light.turn_off: closet_light

# Onboard status LED
status_led:
  pin:
    number: GPIO2
    inverted: true
