<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1350 1150" font-family="monospace" font-size="13">
  <style>
    .title { font-size: 22px; font-weight: bold; fill: #1a1a1a; }
    .subtitle { font-size: 13px; fill: #555; }
    .box { stroke-width: 2; rx: 10; ry: 10; }
    .wire-red { stroke: #d32f2f; stroke-width: 2.5; fill: none; }
    .wire-black { stroke: #222; stroke-width: 2.5; fill: none; }
    .wire-green { stroke: #2e7d32; stroke-width: 2.5; fill: none; }
    .wire-blue { stroke: #1565c0; stroke-width: 2.5; fill: none; }
    .wire-orange { stroke: #e65100; stroke-width: 2.5; fill: none; }
    .label { font-size: 11px; fill: #333; }
    .component-label { font-size: 15px; font-weight: bold; fill: #fff; }
    .component-detail { font-size: 11px; fill: #ddd; }
    .pin-label { font-size: 11px; fill: #fff; font-weight: bold; }
    .pin-num { font-size: 11px; font-weight: bold; }
    .legend { font-size: 12px; fill: #333; }
    .bus-label { font-size: 13px; font-weight: bold; }
  </style>

  <defs>
    <marker id="aRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#d32f2f"/>
    </marker>
    <marker id="aBlack" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#222"/>
    </marker>
    <marker id="aGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#2e7d32"/>
    </marker>
    <marker id="aBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#1565c0"/>
    </marker>
    <marker id="aOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#e65100"/>
    </marker>
    <marker id="aWater" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#0288d1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1350" height="1150" fill="#f5f5f0" rx="12"/>

  <!-- Title -->
  <text x="675" y="38" text-anchor="middle" class="title">Homestead Automation — Wiring Diagram</text>
  <text x="675" y="58" text-anchor="middle" class="subtitle">Raspberry Pi 3 A+ | Bug LEDs + Garden Solenoid | GPIO BCM Numbering</text>

  <!-- ======================================================
       ROW 1: POWER CHAIN (centered, top)
       ====================================================== -->

  <rect x="340" y="80" width="170" height="65" class="box" fill="#f9a825" stroke="#c17900"/>
  <text x="425" y="108" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">Solar Panel</text>
  <text x="425" y="130" text-anchor="middle" font-size="11" fill="#555">ECO-WORTHY 25W</text>

  <line x1="510" y1="103" x2="570" y2="103" class="wire-red" marker-end="url(#aRed)"/>
  <line x1="510" y1="125" x2="570" y2="125" class="wire-black" marker-end="url(#aBlack)"/>

  <rect x="570" y="80" width="210" height="65" class="box" fill="#5d4037" stroke="#3e2723"/>
  <text x="675" y="108" text-anchor="middle" class="component-label">Charge Controller</text>
  <text x="675" y="125" text-anchor="middle" class="component-detail">Renogy Wanderer 10A — PWM LiFePO4</text>

  <line x1="780" y1="103" x2="840" y2="103" class="wire-red" marker-end="url(#aRed)"/>
  <line x1="780" y1="125" x2="840" y2="125" class="wire-black" marker-end="url(#aBlack)"/>

  <rect x="840" y="80" width="220" height="65" class="box" fill="#c62828" stroke="#8e0000"/>
  <text x="950" y="108" text-anchor="middle" class="component-label">12V LiFePO4 Battery</text>
  <text x="950" y="125" text-anchor="middle" class="component-detail">DR.PREPARE 20Ah (240Wh)</text>

  <!-- ======================================================
       BUS BARS — horizontal rails, full width
       ====================================================== -->

  <!-- +12V bus -->
  <line x1="60" y1="188" x2="1280" y2="188" stroke="#d32f2f" stroke-width="4"/>
  <rect x="60" y="178" width="55" height="20" rx="4" fill="#d32f2f"/>
  <text x="87" y="193" text-anchor="middle" class="bus-label" fill="#fff">+12V</text>

  <!-- GND bus -->
  <line x1="60" y1="212" x2="1280" y2="212" stroke="#222" stroke-width="4"/>
  <rect x="60" y="202" width="50" height="20" rx="4" fill="#333"/>
  <text x="85" y="217" text-anchor="middle" class="bus-label" fill="#fff">GND</text>

  <!-- Battery → Bus connection -->
  <path d="M 920 145 L 920 188" class="wire-red" marker-end="url(#aRed)"/>
  <path d="M 980 145 L 980 212" class="wire-black" marker-end="url(#aBlack)"/>

  <!-- ======================================================
       BUCK #2 — center, between bus and Pi
       ====================================================== -->

  <rect x="545" y="260" width="260" height="80" class="box" fill="#1565c0" stroke="#0d47a1"/>
  <text x="675" y="288" text-anchor="middle" class="component-label">DROK Buck #2</text>
  <text x="675" y="308" text-anchor="middle" class="component-detail">12V → 5V — Pi power via micro-USB</text>

  <!-- Buck #2 terminal labels -->
  <rect x="557" y="315" width="55" height="18" rx="3" fill="#0d47a1"/>
  <text x="584" y="328" text-anchor="middle" font-size="9" font-weight="bold" fill="#90caf9">IN+</text>
  <rect x="617" y="315" width="55" height="18" rx="3" fill="#0d47a1"/>
  <text x="644" y="328" text-anchor="middle" font-size="9" font-weight="bold" fill="#bbb">IN−</text>
  <rect x="692" y="315" width="55" height="18" rx="3" fill="#0d47a1"/>
  <text x="719" y="328" text-anchor="middle" font-size="9" font-weight="bold" fill="#90caf9">OUT+</text>
  <rect x="752" y="315" width="55" height="18" rx="3" fill="#0d47a1"/>
  <text x="779" y="328" text-anchor="middle" font-size="9" font-weight="bold" fill="#bbb">OUT−</text>

  <!-- +12V bus → Buck #2 IN+ (straight down) -->
  <path d="M 615 188 L 615 260" class="wire-red" marker-end="url(#aRed)"/>
  <text x="625" y="230" class="label" fill="#d32f2f">+12V</text>

  <!-- GND bus → Buck #2 IN− (straight down) -->
  <path d="M 695 212 L 695 260" class="wire-black" marker-end="url(#aBlack)"/>
  <text x="705" y="242" class="label" fill="#222">GND</text>

  <!-- Buck #2 OUT+ → Pi (5V, straight down) -->
  <path d="M 675 340 L 675 390" class="wire-red" marker-end="url(#aRed)"/>
  <text x="688" y="370" class="label" fill="#d32f2f">5V USB</text>

  <!-- ======================================================
       RASPBERRY PI — center
       ====================================================== -->

  <rect x="510" y="390" width="330" height="195" class="box" fill="#2e7d32" stroke="#1b5e20"/>
  <text x="675" y="420" text-anchor="middle" class="component-label" font-size="17">Raspberry Pi 3 A+</text>
  <text x="675" y="440" text-anchor="middle" class="component-detail" font-size="12">MILTONRP3 — Debian Trixie</text>

  <!-- GPIO labels inside Pi -->
  <rect x="525" y="455" width="145" height="24" rx="4" fill="#1b5e20"/>
  <text x="597" y="472" text-anchor="middle" class="pin-label">← GPIO 17 (LEDs)</text>

  <rect x="525" y="486" width="145" height="24" rx="4" fill="#1b5e20"/>
  <text x="597" y="503" text-anchor="middle" class="pin-label">← GND (Pin 6)</text>

  <rect x="680" y="455" width="145" height="24" rx="4" fill="#1b5e20"/>
  <text x="752" y="472" text-anchor="middle" class="pin-label">GPIO 27 (Valve) →</text>

  <rect x="680" y="486" width="145" height="24" rx="4" fill="#1b5e20"/>
  <text x="752" y="503" text-anchor="middle" class="pin-label">GND (Pin 9) →</text>

  <rect x="590" y="530" width="170" height="24" rx="4" fill="#1b5e20"/>
  <text x="675" y="547" text-anchor="middle" class="pin-label">Pin 2/4 (5V) — Fans ↓</text>

  <!-- ======================================================
       LEFT: GPIO 17 + GND → SSR #1
       Straight horizontal lines going LEFT from Pi
       ====================================================== -->

  <path d="M 510 467 L 340 467" class="wire-green" marker-end="url(#aGreen)"/>
  <text x="415" y="460" class="label" fill="#2e7d32">GPIO 17 → Pin 3</text>

  <path d="M 510 498 L 340 498" class="wire-black" marker-end="url(#aBlack)"/>
  <text x="415" y="518" class="label" fill="#222">GND → Pin 4</text>

  <!-- ======================================================
       RIGHT: GPIO 27 + GND → SSR #2
       Straight horizontal lines going RIGHT from Pi
       ====================================================== -->

  <path d="M 840 467 L 1010 467" class="wire-blue" marker-end="url(#aBlue)"/>
  <text x="910" y="460" class="label" fill="#1565c0">GPIO 27 → Pin 3</text>

  <path d="M 840 498 L 1010 498" class="wire-black" marker-end="url(#aBlack)"/>
  <text x="910" y="518" class="label" fill="#222">GND → Pin 4</text>

  <!-- ======================================================
       SSR #1 — LEFT column
       ====================================================== -->

  <rect x="100" y="415" width="240" height="175" class="box" fill="#6a1b9a" stroke="#4a148c"/>
  <text x="220" y="443" text-anchor="middle" class="component-label">SSR #1 (LEDs)</text>
  <text x="220" y="462" text-anchor="middle" class="component-detail">SSR-41FDD — 6A 60VDC</text>

  <!-- SSR #1 pin boxes -->
  <rect x="112" y="475" width="108" height="55" rx="5" fill="#4a148c" stroke="#ce93d8" stroke-width="1"/>
  <text x="166" y="492" text-anchor="middle" font-size="10" font-weight="bold" fill="#ce93d8">INPUT</text>
  <text x="166" y="508" text-anchor="middle" class="pin-num" fill="#81c784">Pin 3: + (GPIO)</text>
  <text x="166" y="524" text-anchor="middle" class="pin-num" fill="#bbb">Pin 4: − (GND)</text>

  <rect x="228" y="475" width="100" height="55" rx="5" fill="#4a148c" stroke="#ce93d8" stroke-width="1"/>
  <text x="278" y="492" text-anchor="middle" font-size="10" font-weight="bold" fill="#ce93d8">OUTPUT</text>
  <text x="278" y="508" text-anchor="middle" class="pin-num" fill="#ef9a9a">Pin 1: + (12V)</text>
  <text x="278" y="524" text-anchor="middle" class="pin-num" fill="#ffcc80">Pin 2: − (load)</text>

  <!-- +12V bus → SSR #1 Pin 1 (straight down, left side, no crossings) -->
  <path d="M 160 188 L 160 415" class="wire-red" marker-end="url(#aRed)"/>
  <text x="130" y="310" class="label" fill="#d32f2f">+12V</text>
  <text x="120" y="323" class="label" fill="#d32f2f">→ Pin 1</text>

  <!-- SSR #1 Pin 2 → Buck #1 IN+ (straight down) -->
  <path d="M 220 590 L 220 640" class="wire-orange" marker-end="url(#aOrange)"/>
  <text x="232" y="620" class="label" fill="#e65100">Pin 2 → IN+</text>

  <!-- ======================================================
       SSR #2 — RIGHT column
       ====================================================== -->

  <rect x="1010" y="415" width="240" height="175" class="box" fill="#6a1b9a" stroke="#4a148c"/>
  <text x="1130" y="443" text-anchor="middle" class="component-label">SSR #2 (Solenoid)</text>
  <text x="1130" y="462" text-anchor="middle" class="component-detail">SSR-41FDD — 6A 60VDC</text>

  <!-- SSR #2 pin boxes -->
  <rect x="1022" y="475" width="108" height="55" rx="5" fill="#4a148c" stroke="#ce93d8" stroke-width="1"/>
  <text x="1076" y="492" text-anchor="middle" font-size="10" font-weight="bold" fill="#ce93d8">INPUT</text>
  <text x="1076" y="508" text-anchor="middle" class="pin-num" fill="#90caf9">Pin 3: + (GPIO)</text>
  <text x="1076" y="524" text-anchor="middle" class="pin-num" fill="#bbb">Pin 4: − (GND)</text>

  <rect x="1138" y="475" width="100" height="55" rx="5" fill="#4a148c" stroke="#ce93d8" stroke-width="1"/>
  <text x="1188" y="492" text-anchor="middle" font-size="10" font-weight="bold" fill="#ce93d8">OUTPUT</text>
  <text x="1188" y="508" text-anchor="middle" class="pin-num" fill="#ef9a9a">Pin 1: + (12V)</text>
  <text x="1188" y="524" text-anchor="middle" class="pin-num" fill="#ffcc80">Pin 2: − (load)</text>

  <!-- +12V bus → SSR #2 Pin 1 (straight down, right side, no crossings) -->
  <path d="M 1190 188 L 1190 415" class="wire-red" marker-end="url(#aRed)"/>
  <text x="1198" y="310" class="label" fill="#d32f2f">+12V</text>
  <text x="1198" y="323" class="label" fill="#d32f2f">→ Pin 1</text>

  <!-- SSR #2 Pin 2 → Solenoid (straight down) -->
  <path d="M 1130 590 L 1130 640" class="wire-orange" marker-end="url(#aOrange)"/>
  <text x="1142" y="620" class="label" fill="#e65100">Pin 2 → Sol+</text>

  <!-- ======================================================
       BUCK #1 — LEFT column, below SSR #1
       ====================================================== -->

  <rect x="100" y="640" width="240" height="95" class="box" fill="#1565c0" stroke="#0d47a1"/>
  <text x="220" y="668" text-anchor="middle" class="component-label">DROK Buck #1</text>
  <text x="220" y="688" text-anchor="middle" class="component-detail">12V → 3.2V — LED power (4A max)</text>

  <!-- Buck #1 terminal labels -->
  <rect x="112" y="698" width="50" height="18" rx="3" fill="#0d47a1"/>
  <text x="137" y="711" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffcc80">IN+</text>
  <rect x="167" y="698" width="50" height="18" rx="3" fill="#0d47a1"/>
  <text x="192" y="711" text-anchor="middle" font-size="9" font-weight="bold" fill="#bbb">IN−</text>
  <rect x="227" y="698" width="50" height="18" rx="3" fill="#0d47a1"/>
  <text x="252" y="711" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffcc80">OUT+</text>
  <rect x="282" y="698" width="50" height="18" rx="3" fill="#0d47a1"/>
  <text x="307" y="711" text-anchor="middle" font-size="9" font-weight="bold" fill="#bbb">OUT−</text>

  <!-- Buck #1 IN− → GND bus (goes left to x=65, then up) -->
  <path d="M 100 680 L 65 680 L 65 212" class="wire-black" marker-end="url(#aBlack)"/>
  <text x="45" y="450" class="label" fill="#222">IN−</text>
  <text x="40" y="463" class="label" fill="#222">GND</text>

  <!-- Buck #1 OUT+ → LED + (straight down) -->
  <path d="M 190 735 L 190 780" class="wire-orange" marker-end="url(#aOrange)"/>
  <text x="200" y="762" class="label" fill="#e65100">OUT+</text>

  <!-- Buck #1 OUT− ← LED − (return, right side) -->
  <path d="M 270 780 L 270 735" class="wire-black" marker-end="url(#aBlack)"/>
  <text x="280" y="762" class="label" fill="#222">OUT−</text>

  <!-- ======================================================
       LEDs — LEFT column, below Buck #1
       ====================================================== -->

  <rect x="80" y="780" width="280" height="115" class="box" fill="#311b92" stroke="#1a0063"/>
  <text x="220" y="810" text-anchor="middle" class="component-label">Bug Attraction LEDs</text>
  <text x="220" y="833" text-anchor="middle" class="component-detail">5× UV 365nm (3W) @ 450mA each</text>
  <text x="220" y="850" text-anchor="middle" class="component-detail">5× Blue 460nm (1W) @ 350mA each</text>
  <text x="220" y="867" text-anchor="middle" class="component-detail">All 10 in PARALLEL @ 3.2V</text>
  <text x="220" y="884" text-anchor="middle" class="component-detail">Aluminum bar heatsink</text>

  <!-- ======================================================
       SOLENOID — RIGHT column, below SSR #2
       ====================================================== -->

  <rect x="1010" y="640" width="240" height="90" class="box" fill="#00695c" stroke="#004d40"/>
  <text x="1130" y="670" text-anchor="middle" class="component-label">Solenoid Valve</text>
  <text x="1130" y="692" text-anchor="middle" class="component-detail">U.S. Solid 1/4" NC — 12V @ 1A</text>
  <text x="1130" y="709" text-anchor="middle" class="component-detail">Sol+ (top)    Sol− (bottom)</text>

  <!-- Solenoid GND return → GND bus (goes right to x=1285, then up) -->
  <path d="M 1250 680 L 1285 680 L 1285 212" class="wire-black" marker-end="url(#aBlack)"/>
  <text x="1290" y="450" class="label" fill="#222">Sol−</text>
  <text x="1290" y="463" class="label" fill="#222">GND</text>

  <!-- Water flow from solenoid -->
  <path d="M 1130 730 L 1130 770" stroke="#0288d1" stroke-width="3" fill="none" marker-end="url(#aWater)"/>
  <rect x="1050" y="770" width="160" height="50" rx="8" fill="#0288d1" stroke="#01579b" stroke-width="1.5"/>
  <text x="1130" y="795" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Rain Barrel</text>
  <text x="1130" y="812" text-anchor="middle" font-size="10" fill="#ddd">→ Garden (18 rows)</text>

  <!-- ======================================================
       FANS — below Pi, center
       ====================================================== -->

  <rect x="590" y="620" width="170" height="60" class="box" fill="#546e7a" stroke="#37474f"/>
  <text x="675" y="647" text-anchor="middle" class="component-label">2× Cooling Fans</text>
  <text x="675" y="667" text-anchor="middle" class="component-detail">5V always-on from Pi</text>

  <!-- Pi 5V → Fans -->
  <path d="M 675 585 L 675 620" class="wire-red" marker-end="url(#aRed)"/>
  <text x="688" y="608" class="label" fill="#d32f2f">5V</text>

  <!-- Fan GND → Pi GND (loops back) -->
  <path d="M 675 680 L 675 700 L 500 700 L 500 498 L 510 498" class="wire-black" marker-end="url(#aBlack)"/>
  <text x="505" y="600" class="label" fill="#222">Fan</text>
  <text x="505" y="613" class="label" fill="#222">GND</text>

  <!-- ======================================================
       LEGEND
       ====================================================== -->

  <rect x="60" y="940" width="1230" height="190" rx="10" fill="#e8e8e3" stroke="#bbb" stroke-width="1"/>

  <text x="90" y="970" font-size="16" font-weight="bold" fill="#333">Legend</text>

  <!-- Wire colors -->
  <line x1="90" y1="1000" x2="140" y2="1000" class="wire-red" marker-end="url(#aRed)"/>
  <text x="152" y="1005" class="legend">+12V / +5V power</text>

  <line x1="350" y1="1000" x2="400" y2="1000" class="wire-black" marker-end="url(#aBlack)"/>
  <text x="412" y="1005" class="legend">Ground (GND)</text>

  <line x1="580" y1="1000" x2="630" y2="1000" class="wire-green" marker-end="url(#aGreen)"/>
  <text x="642" y="1005" class="legend">GPIO 17 (LEDs)</text>

  <line x1="830" y1="1000" x2="880" y2="1000" class="wire-blue" marker-end="url(#aBlue)"/>
  <text x="892" y="1005" class="legend">GPIO 27 (Solenoid)</text>

  <line x1="1080" y1="1000" x2="1130" y2="1000" class="wire-orange" marker-end="url(#aOrange)"/>
  <text x="1142" y="1005" class="legend">Switched 12V</text>

  <!-- SSR pin reference -->
  <line x1="90" y1="1030" x2="1230" y2="1030" stroke="#ccc" stroke-width="1"/>
  <text x="90" y="1055" font-size="14" font-weight="bold" fill="#333">SSR-41FDD Pin Reference</text>

  <text x="90" y="1080" class="legend" fill="#d32f2f">Pin 1 — Output +</text>
  <text x="90" y="1097" class="legend">12V power IN from bus</text>

  <text x="400" y="1080" class="legend" fill="#e65100">Pin 2 — Output −</text>
  <text x="400" y="1097" class="legend">Switched power OUT to load</text>

  <text x="710" y="1080" class="legend" fill="#2e7d32">Pin 3 — Input +</text>
  <text x="710" y="1097" class="legend">Control signal from GPIO</text>

  <text x="1010" y="1080" class="legend">Pin 4 — Input −</text>
  <text x="1010" y="1097" class="legend">Control GND from Pi</text>

  <!-- Buck converter reference -->
  <line x1="90" y1="1110" x2="1230" y2="1110" stroke="#ccc" stroke-width="1"/>
  <text x="90" y="1130" font-size="12" font-weight="bold" fill="#333">Buck Converters:</text>
  <text x="280" y="1130" class="legend">IN+ / IN− = power input from source     OUT+ / OUT− = stepped-down power output to load</text>

</svg>
